<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes</title>
</head>
<body>
    <h1>QUIZZES</h1>
    {% if latest_quizzes %}
        <ul>
            {% for quiz in latest_quizzes %}
                <li><a href="{% url 'quizzes:detail' quiz.id %}">{{ quiz.title }}</a></li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No Quizzes</p>
    {% endif %}
</body>
</html>
